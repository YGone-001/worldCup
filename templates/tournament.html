{% extends "base.html" %}

{% block content %}
<div class="match-detail-header" style="text-align: center; margin-bottom: 24px;">
    <h2>🏆 蒙特卡洛锦标赛推演引擎 (Monte Carlo Simulator)</h2>
    <p style="color: var(--text-secondary); margin-top: 8px;">基于 1,000 次平行宇宙模拟，结合剩余赛程与动态 Elo 引擎计算的晋级概率</p>
</div>

<div class="tournament-container" style="overflow-x: auto; margin-top: 24px;">
    <table class="tournament-table" style="width: 100%; border-collapse: collapse; background: rgba(0,0,0,0.2); border-radius: var(--radius-md); overflow: hidden;">
        <thead>
            <tr style="background: rgba(255,255,255,0.05); text-align: center; border-bottom: 1px solid var(--glass-border);">
                <th style="padding: 16px;">排名</th>
                <th style="padding: 16px; text-align: left;">球队</th>
                <th style="padding: 16px;">夺冠 (Win)</th>
                <th style="padding: 16px;">决赛 (Final)</th>
                <th style="padding: 16px;">四强 (SF)</th>
                <th style="padding: 16px;">八强 (QF)</th>
                <th style="padding: 16px;">晋级16强</th>
            </tr>
        </thead>
        <tbody id="leaderboard-body">
            <tr><td colspan="7" style="text-align:center; padding: 32px;">正在运行 1,000 次蒙特卡洛推演，请稍候... ⏳</td></tr>
        </tbody>
    </table>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    fetch('/api/v1/tournament')
        .then(response => response.json())
        .then(data => {
            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = '';
            
            data.forEach((team, index) => {
                const tr = document.createElement('tr');
                tr.style.borderBottom = '1px solid rgba(255,255,255,0.05)';
                tr.style.textAlign = 'center';
                
                // Highlight top 3
                let rankStyle = '';
                if (index === 0) rankStyle = 'color: #fbbf24; font-weight: bold; font-size: 1.2rem;';
                if (index === 1) rankStyle = 'color: #94a3b8; font-weight: bold; font-size: 1.1rem;';
                if (index === 2) rankStyle = 'color: #b45309; font-weight: bold; font-size: 1.1rem;';
                
                tr.innerHTML = `
                    <td style="padding: 12px; ${rankStyle}">${index + 1}</td>
                    <td style="padding: 12px; text-align: left;">
                        <span style="font-size: 1.2rem; margin-right: 8px;">${team.flag}</span>
                        <span style="font-weight: 600;">${team.name}</span>
                    </td>
                    <td style="padding: 12px; font-weight: 700; color: #10b981;">${team.win}%</td>
                    <td style="padding: 12px; color: var(--text-primary);">${team.final}%</td>
                    <td style="padding: 12px; color: var(--text-secondary);">${team.sf}%</td>
                    <td style="padding: 12px; color: var(--text-secondary);">${team.qf}%</td>
                    <td style="padding: 12px; color: var(--text-muted);">${team.group_adv}%</td>
                `;
                
                tr.addEventListener('mouseover', () => tr.style.background = 'rgba(255,255,255,0.02)');
                tr.addEventListener('mouseout', () => tr.style.background = 'transparent');
                
                tbody.appendChild(tr);
            });
        });
});
</script>

{% endblock %}
